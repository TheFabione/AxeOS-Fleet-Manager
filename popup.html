<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{width:280px;background:#0d0d1a;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;padding:16px}
.header{display:flex;align-items:center;gap:10px;margin-bottom:14px}.logo{width:32px;height:32px;background:linear-gradient(135deg,#f7931a,#e8750a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#0d0d1a}
h1{font-size:14px;font-weight:600;color:#fff}h1 span{display:block;font-size:11px;font-weight:400;color:#888;margin-top:2px}
.btn{width:100%;padding:10px;border:none;border-radius:8px;background:linear-gradient(135deg,#f7931a,#e8750a);color:#0d0d1a;font-weight:600;font-size:13px;cursor:pointer}.btn:hover{opacity:.9}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}.stat{background:#161625;border-radius:8px;padding:10px;text-align:center}.stat .val{font-size:16px;font-weight:700;color:#f7931a}.stat .lbl{font-size:10px;color:#666;margin-top:2px}
.ver{text-align:center;margin-top:10px;font-size:10px;color:#444}
</style></head><body>
<div class="header"><div class="logo"><svg viewBox="0 0 32 32" width="18" height="18"><path d="M6 6L26 26M26 6L6 26" stroke="#0d0d1a" stroke-width="3.5" stroke-linecap="round"/><rect x="12" y="12" width="8" height="8" rx="1.5" transform="rotate(45 16 16)" fill="#0d0d1a"/></svg></div><h1>AxeOS Fleet Manager<span>BitAxe & NerdQAxe Dashboard</span></h1></div>
<div class="stats"><div class="stat"><div class="val" id="dc">--</div><div class="lbl">Devices</div></div><div class="stat"><div class="val" id="th">--</div><div class="lbl">Total GH/s</div></div></div>
<button class="btn" id="o">Open Dashboard</button><div class="ver">v1.0</div>
<script src="popup.js"></script></body></html>
